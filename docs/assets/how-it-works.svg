<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Twitch Local Exporter technical architecture</title>
  <desc id="desc">A Twitch VOD page starts an export in a browser extension. A local Windows native host uses local tools to download media, create subtitles, and export chat. Files are written only to the selected local folder.</desc>
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 7 L2 12 Z" fill="#0f766e"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .header-title { font: 700 32px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .header-subtitle { font: 500 16px "Segoe UI", Arial, sans-serif; fill: #dff7ef; }
      .stage { fill: #ffffff; stroke: #d8e2ee; stroke-width: 2; filter: url(#shadow); }
      .boundary { fill: #f0fdf9; stroke: #8bd5c6; stroke-width: 2; stroke-dasharray: 8 7; }
      .overline { font: 700 12px "Segoe UI", Arial, sans-serif; letter-spacing: 1.3px; fill: #64748b; }
      .boundary-label { font: 700 12px "Segoe UI", Arial, sans-serif; letter-spacing: 1px; fill: #0f766e; }
      .stage-title { font: 700 21px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .stage-body { font: 500 14px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .chip { font: 700 12px "Segoe UI", Arial, sans-serif; }
      .chip-blue { fill: #e0ebff; }
      .chip-blue-text { fill: #1d4ed8; }
      .chip-teal { fill: #dff7ef; }
      .chip-teal-text { fill: #0f766e; }
      .chip-amber { fill: #fff2cc; }
      .chip-amber-text { fill: #a16207; }
      .number { font: 700 16px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #0f766e; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .arrow-note { font: 700 11px "Segoe UI", Arial, sans-serif; fill: #0f766e; }
      .output-title { font: 700 19px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .output-body { font: 500 13px "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .output-label { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .output-detail { font: 500 12px "Segoe UI", Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720"/>

  <rect x="56" y="40" width="1168" height="132" rx="26" fill="url(#header)"/>
  <text x="92" y="94" class="header-title">Twitch VOD export, processed locally</text>
  <text x="92" y="126" class="header-subtitle">The browser starts the job; Windows performs download, conversion, transcription, and chat export on your machine.</text>
  <rect x="92" y="141" width="132" height="22" rx="11" fill="#dff7ef"/>
  <text x="108" y="157" class="chip chip-teal-text">NO CLOUD UPLOAD</text>
  <rect x="238" y="141" width="162" height="22" rx="11" fill="#dbeafe"/>
  <text x="254" y="157" class="chip chip-blue-text">USER-INITIATED ONLY</text>

  <rect x="620" y="204" width="600" height="322" rx="24" class="boundary"/>
  <rect x="648" y="220" width="212" height="24" rx="12" class="chip-teal"/>
  <text x="664" y="237" class="boundary-label">LOCAL WINDOWS BOUNDARY</text>

  <rect x="60" y="258" width="250" height="246" rx="20" class="stage"/>
  <circle cx="92" cy="292" r="17" fill="#2563eb"/>
  <text x="87" y="298" class="number">1</text>
  <text x="120" y="288" class="overline">SOURCE</text>
  <text x="88" y="337" class="stage-title">Twitch VOD page</text>
  <text x="88" y="371" class="stage-body">Open a video you are allowed</text>
  <text x="88" y="393" class="stage-body">to export in a Chromium browser.</text>
  <rect x="88" y="432" width="154" height="28" rx="14" class="chip-blue"/>
  <text x="104" y="451" class="chip chip-blue-text">ACTIVE TAB, ON CLICK</text>

  <rect x="355" y="258" width="250" height="246" rx="20" class="stage"/>
  <circle cx="387" cy="292" r="17" fill="#2563eb"/>
  <text x="382" y="298" class="number">2</text>
  <text x="415" y="288" class="overline">BROWSER</text>
  <text x="383" y="337" class="stage-title">Extension popup</text>
  <text x="383" y="371" class="stage-body">Collects the URL, title, selected</text>
  <text x="383" y="393" class="stage-body">format, and optional cookies.</text>
  <rect x="383" y="432" width="158" height="28" rx="14" class="chip-blue"/>
  <text x="399" y="451" class="chip chip-blue-text">EXPORT REQUEST</text>

  <rect x="650" y="258" width="250" height="246" rx="20" class="stage"/>
  <circle cx="682" cy="292" r="17" fill="#0f766e"/>
  <text x="677" y="298" class="number">3</text>
  <text x="710" y="288" class="overline">WINDOWS</text>
  <text x="678" y="337" class="stage-title">Native host</text>
  <text x="678" y="371" class="stage-body">Native messaging receives the job</text>
  <text x="678" y="393" class="stage-body">and returns status to the popup.</text>
  <rect x="678" y="432" width="162" height="28" rx="14" class="chip-teal"/>
  <text x="694" y="451" class="chip chip-teal-text">LOCAL PROCESS ONLY</text>

  <rect x="945" y="258" width="250" height="246" rx="20" class="stage"/>
  <circle cx="977" cy="292" r="17" fill="#d97706"/>
  <text x="972" y="298" class="number">4</text>
  <text x="1005" y="288" class="overline">TOOLCHAIN</text>
  <text x="973" y="337" class="stage-title">Local tools</text>
  <text x="973" y="371" class="stage-body">yt-dlp and FFmpeg handle media;</text>
  <text x="973" y="393" class="stage-body">Whisper and TwitchDownloaderCLI</text>
  <text x="973" y="415" class="stage-body">create subtitles and chat logs.</text>
  <rect x="973" y="442" width="136" height="28" rx="14" class="chip-amber"/>
  <text x="989" y="461" class="chip chip-amber-text">RUNS LOCALLY</text>

  <path d="M312 522 H341" class="arrow"/>
  <path d="M607 522 H636" class="arrow"/>
  <path d="M902 522 H931" class="arrow"/>

  <rect x="60" y="562" width="1135" height="112" rx="22" fill="#ffffff" stroke="#d8e2ee" stroke-width="2"/>
  <text x="92" y="601" class="output-title">Selected local output folder</text>
  <text x="92" y="624" class="output-body">Generated files stay on your machine.</text>

  <circle cx="428" cy="597" r="7" fill="#0f766e"/>
  <text x="446" y="602" class="output-label">Media</text>
  <text x="446" y="624" class="output-detail">MP4 · M4A · MP3 · OPUS · WAV</text>
  <circle cx="678" cy="597" r="7" fill="#2563eb"/>
  <text x="696" y="602" class="output-label">Subtitles</text>
  <text x="696" y="624" class="output-detail">SRT · VTT · Traditional Chinese</text>
  <circle cx="958" cy="597" r="7" fill="#d97706"/>
  <text x="976" y="602" class="output-label">Chat</text>
  <text x="976" y="624" class="output-detail">JSON · HTML · plain text</text>
</svg>
